<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; width:100%; height:100%; border-radius:22.5%; overflow:hidden; background:{{ bg }}; box-shadow: inset 0 1.5px 1px rgba(255,255,255,.30), inset 0 -10px 28px rgba(0,0,0,.30);">
  <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,.30) 0%, rgba(255,255,255,0) 44%); pointer-events:none;"></div>
  <div style="position:absolute; inset:0; background:radial-gradient(125% 85% at 50% 12%, rgba(255,255,255,.22), transparent 58%); pointer-events:none;"></div>
  <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
    <sc-if value="{{ isStorm }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 100 100" style="width:64%; height:64%; filter:drop-shadow(0 3px 5px rgba(0,0,0,.40));">
        <g fill="{{ glyphColor }}">
          <circle cx="36" cy="46" r="15"></circle>
          <circle cx="61" cy="44" r="19"></circle>
          <circle cx="49" cy="33" r="16"></circle>
          <rect x="22" y="42" width="57" height="22" rx="11"></rect>
        </g>
        <polygon points="55,50 37,79 49,79 44,98 70,64 53,64" fill="{{ accentColor }}"></polygon>
      </svg>
    </sc-if>
    <sc-if value="{{ isBolt }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 100 100" style="width:52%; height:62%; filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));">
        <polygon points="60,5 28,55 47,55 40,95 74,40 53,40" fill="{{ glyphColor }}"></polygon>
      </svg>
    </sc-if>
    <sc-if value="{{ isOrch }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 100 100" style="width:70%; height:70%; filter:drop-shadow(0 3px 5px rgba(0,0,0,.35));">
        <circle cx="27" cy="50" r="18" fill="{{ glyphColor }}"></circle>
        <circle cx="80" cy="50" r="9" fill="{{ glyphColor }}" opacity="0.8"></circle>
        <polygon points="46,36 39,51 47,51 42,66 62,47 51,47" fill="{{ accentColor }}"></polygon>
      </svg>
    </sc-if>
    <sc-if value="{{ isPrompt }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 100 100" style="width:62%; height:62%; filter:drop-shadow(0 3px 5px rgba(0,0,0,.35));">
        <g fill="none" stroke="{{ glyphColor }}" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="29,27 55,50 29,73"></polyline>
          <line x1="60" y1="74" x2="82" y2="74"></line>
        </g>
      </svg>
    </sc-if>
  </div>
  <div style="position:absolute; inset:0; border-radius:22.5%; box-shadow: inset 0 0 0 1px rgba(255,255,255,.14); pointer-events:none;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:256,&quot;height&quot;:256},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;storm&quot;,&quot;bolt&quot;,&quot;orch&quot;,&quot;prompt&quot;],&quot;default&quot;:&quot;storm&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;bg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;linear-gradient(155deg,#243056,#0c1024)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;glyphColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffffff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffce3a&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.variant || 'storm';
    return {
      bg: this.props.bg || 'linear-gradient(155deg,#243056,#0c1024)',
      glyphColor: this.props.glyphColor || '#ffffff',
      accentColor: this.props.accentColor || '#ffce3a',
      isStorm: v === 'storm',
      isBolt: v === 'bolt',
      isOrch: v === 'orch',
      isPrompt: v === 'prompt'
    };
  }
}
</script>
</body>
</html>
